apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartshop-backend-canary
  namespace: smartshop
  labels:
    app: smartshop-backend
    track: canary
spec:
  replicas: 1 # Starts with 1 pod (if stable has 3 pods, canary gets 25% of traffic)
  selector:
    matchLabels:
      app: smartshop-backend
      track: canary
  template:
    metadata:
      labels:
        app: smartshop-backend
        track: canary
    spec:
      containers:
      - name: backend
        image: "your-account-id.dkr.ecr.eu-west-1.amazonaws.com/smartshop-backend:v2-new-feature"
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: smartshop-backend-config
        env:
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: smartshop-secrets
              key: db-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smartshop-secrets
              key: db-password
        - name: SQS_QUEUE_URL
          valueFrom:
            secretKeyRef:
              name: smartshop-secrets
              key: sqs-queue-url
        - name: AWS_REGION
          value: "eu-west-1"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
