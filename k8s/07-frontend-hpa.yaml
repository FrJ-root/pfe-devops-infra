apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartshop-frontend-hpa
  namespace: smartshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartshop-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
