apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartshop-backend
  namespace: smartshop
  labels:
    app: smartshop-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartshop-backend
  template:
    metadata:
      labels:
        app: smartshop-backend
    spec:
      containers:
      - name: backend
        # Placeholder image - this will be replaced by your real ECR repo URI in CI/CD block
        image: "your-account-id.dkr.ecr.eu-west-1.amazonaws.com/smartshop-backend:latest"
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: smartshop-backend-config
        env:
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: smartshop-secrets
              key: db-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smartshop-secrets
              key: db-password
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: smartshop-backend-svc
  namespace: smartshop
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: smartshop-backend
