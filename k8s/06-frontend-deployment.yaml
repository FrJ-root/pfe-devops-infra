apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartshop-frontend
  namespace: smartshop
  labels:
    app: smartshop-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartshop-frontend
  template:
    metadata:
      labels:
        app: smartshop-frontend
    spec:
      containers:
      - name: frontend
        image: "481665130660.dkr.ecr.eu-west-1.amazonaws.com/smartshop-frontend:latest"
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: smartshop-frontend-svc
  namespace: smartshop
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: smartshop-frontend
